<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #343a40; color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #495057; padding: 15px; text-align: center; border-bottom: 2px solid #ffc107; }
        header h2 { margin-bottom: 10px; font-size: 2.5rem; color: #ffc107; }
        .container { padding: 20px; max-width: 600px; margin: 20px auto; background-color: #495057; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 16px; }
        .form-group input {
            width: 100%;
            padding: 10px 40px 10px 10px; /* Оставляем место для иконки справа */
            border: 1px solid #ced4da;
            border-radius: 5px;
            background-color: #495057;
            color: #fff;
        }
        .form-group input::placeholder { color: #adb5bd; }
        .form-group button {
            position: absolute;
            right: 10px; /* Расстояние от правого края */
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #ffc107;
            font-size: 18px;
        }
        .form-group button:hover { color: #e0a800; }
        .message { text-align: center; margin: 10px 0; padding: 10px; border-radius: 5px; display: none; }
        .message.success { background-color: #28a745; color: #fff; }
        .message.error { background-color: #dc3545; color: #fff; }
    </style>
</head>
<body>
<header>
    <h2>Сброс пароля</h2>
</header>
<div class="container">
    <section class="section">
        <h2>Введите новый пароль</h2>
        <form id="reset-password-form" action="/reset-password/change" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="form-group">
                <label for="password">Новый пароль:</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Введите новый пароль">
                <button type="button" class="toggle-password" data-target="password">👁</button>
            </div>
            <div class="form-group">
                <label for="confirm-password">Подтвердите новый пароль:</label>
                <input type="password" id="confirm-password" name="confirm-password" required minlength="6" placeholder="Подтвердите новый пароль">
                <button type="button" class="toggle-password" data-target="confirm-password">👁</button>
            </div>
            <div class="form-group">
                <button type="submit">Сменить пароль</button>
            </div>
        </form>
        <div id="success-message" class="message success">Ваш пароль успешно обновлён!</div>
        <div id="error-message" class="message error">Произошла ошибка. Попробуйте ещё раз.</div>
    </section>
</div>

<script>
    // Функция для отображения/скрытия пароля
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function () {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (input.type === 'password') {
                input.type = 'text';
                this.textContent = '🙈'; // Изменить иконку
            } else {
                input.type = 'password';
                this.textContent = '👁'; // Вернуть иконку
            }
        });
    });

    // Логика проверки пароля
    document.getElementById('reset-password-form').addEventListener('submit', function (event) {
        const passwordInput = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        document.getElementById('success-message').style.display = 'none';
        document.getElementById('error-message').style.display = 'none';

        if (passwordInput.length < 6) {
            event.preventDefault();
            document.getElementById('error-message').textContent = 'Пароль должен содержать не менее 6 символов!';
            document.getElementById('error-message').style.display = 'block';
            return;
        }
        if (passwordInput !== confirmPassword) {
            event.preventDefault();
            document.getElementById('error-message').textContent = 'Пароли не совпадают! Пожалуйста, проверьте и попробуйте снова.';
            document.getElementById('error-message').style.display = 'block';
            return;
        }
        fetch('/reset-password/change', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: passwordInput, token: document.querySelector('input[name="token"]').value })
        })
            .then(response => {
                if (response.ok) {
                    document.getElementById('success-message').style.display = 'block';
                } else {
                    throw new Error('Ошибка при смене пароля.');
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('error-message').style.display = 'block';
            });

        event.preventDefault();
    });
</script>
</body>
</html>
